version: "3.9"

services:

  backend:
    build: ./backend
    container_name: resume_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    restart: always

  student_app:
    build: ./frontend
    command: streamlit run streamlit.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: always
