<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
        background-color: black;
        margin:0;
        padding:0;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .header{
        background-color: black;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header h1{
        text-align: left;
        font-size: 25px;
        color:white;
    }
    .sub a{
        color:white;
        text-align: right;
        font-size: 15px;
        cursor:pointer;
        text-decoration: none;
        gap:30px;
        list-style:none;



    }
    .subject{
        background-color: rgb(231, 231, 231);
        color:black;
        padding: 40px;
    }
    .subject h2{
        text-align: center;
        justify-content: center;
        font-size: 50px;

    }
    .subject h3{
        text-align: center;
        justify-content: center;
        font-size: 20px;
        color:#646363;
    }

    .projects{
        text-align: center;
        background-color: white;
        color:black;
        padding: 60px 40px;
       
    }
    .projects h3{
        text-align: center;
        font-size: 40px;
    }
    .Sub{
        display: flex;
        gap: 20px;
        justify-content: space-between;

    }
    .card h4{
        background: #eaeaea;
        padding: 40px;
        flex: 1;
        text-align: center;
        border-radius: 10px;
        transition: 0.3s;
        width:250px;

    }
    .card h4:hover{
        background: #ddd;
        transform: scale(1.05);

    }
    
    .contact {
        background: #111;
        color: white;
        padding: 60px 40px;
        text-align: center;
        
    }
    .contact h4{
        color:white;
        text-align: center;
        font-size: 50px;
    }

    form input , form textarea{
        height:30px;
        padding:10px;
        width:800px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;

    }
    form button{
        padding: 10px 20px;
        border: none;
        background: #00adb5;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }
    .footer{
        background-color: black;
        padding :20px;
    }
    .footer h2{
        text-align:center;
        color:white;
        font-size: 20px;
    }
    @media (max-width: 992px){
        .projects {
            flex-wrap: wrap;
        }
        .card {
            flex: 45%;
        }

        .form input, textarea {
            width: 80%;
        }

    }
    @media (max-width: 768px){
        .header {
            flex-direction: column;
            align-items: flex-start;
        }

        sub a {
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .subject h2 {
            font-size: 28px;
        }

        .projects {
            flex-direction: column;
        }

        .card {
            width: 100%;
        }

        .form input, textarea {
            width: 100%;
        }
        
    }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Portfolio</h1>
        <div class="sub">
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">Contact</a>
        </div>
    </div>
    <div class="subject">
        <h2> Hello , I am Maha vigneshwari </h2>
        <h3> Frontend developer | React | Python</h3>
    </div>

    <div class="projects">
        <h3>My Projects</h3>
        <div class="Sub">
            <div class="card">
                <h4>Project 1</h4>
            </div>
            <div class="card">
                <h4>Project 2</h4>
            </div>
            <div class="card">
                <h4>Project 3</h4>
            </div>
         </div>
    </div>
    <div class="contact">
            <h4>Contact Me</h4>
                <form> 
                    <input type="text" placeholder=" your name:"><br>
                    <input type="text" placeholder=" your email:"><br>
                    <textarea rows="5" placeholder="your message:"></textarea><br>
                    <button>send message</button> 
                </form>
            </div>
    </div>
    <div class="footer">
        <h2> @ 2026 Maha Vigneshwari | All Rights Reserved </h2>
    </div>
</body>
</html>
